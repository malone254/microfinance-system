<!DOCTYPE html>
<html>
<head>
<title>Apply Loan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0f172a;color:white;text-align:center;font-family:Inter;padding:40px}

input{
  width:80%;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>Apply Loan</h2>

<input id="amount" placeholder="Amount">
<input id="months" placeholder="Months">

<br>

<button onclick="apply()">Submit</button>

<script>
async function apply(){
  const token = localStorage.getItem("token");

  await fetch("http://localhost:5000/api/loans/apply",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      amount:amount.value,
      months:months.value
    })
  });

  alert("Loan submitted");
  location.href="dashboard.html";
}
</script>

</body>
</html>
