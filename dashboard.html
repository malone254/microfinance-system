<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Malone Lending</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:15px 8%;
  background:#0f172a;
}

.logo{color:#22c55e;font-weight:800;}

.wrapper{max-width:900px;margin:auto;padding:20px;}

.card{
  background:#111827;
  padding:20px;
  border-radius:14px;
  margin-bottom:18px;
}

.title{color:#22c55e;font-weight:700;margin-bottom:15px;}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0f172a;
  color:white;
}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">MALONE</div>
  <div>Logout</div>
</div>

<div class="wrapper">

<!-- PERSONAL INFO -->
<div class="card">
  <div class="title">Personal Information</div>

  <div class="grid">
    <input placeholder="First Name">
    <input placeholder="Middle Name (optional)">
  </div>

  <input placeholder="Last Name">

  <!-- DOB -->
  <input type="date" placeholder="Date of Birth">

  <input placeholder="National ID Number">
  <input placeholder="E-mail">

  <!-- GENDER -->
  <select>
    <option>Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <input placeholder="+254 Alternative Phone (optional)">
</div>

<!-- ADDITIONAL INFO -->
<div class="card">
  <div class="title">Additional Information</div>

  <!-- COUNTY (KENYA) -->
  <select>
    <option>Select County</option>
    <option>Nairobi</option>
    <option>Mombasa</option>
    <option>Kisumu</option>
    <option>Nakuru</option>
    <option>Eldoret (Uasin Gishu)</option>
    <option>Kiambu</option>
    <option>Kajiado</option>
    <option>Machakos</option>
    <option>Meru</option>
    <option>Nyeri</option>
    <option>Garissa</option>
    <option>Wajir</option>
    <option>Mandera</option>
    <option>Bungoma</option>
    <option>Kakamega</option>
  </select>

  <input placeholder="Town / Estate">

  <!-- EDUCATION -->
  <select>
    <option>Education Level</option>
    <option>Primary</option>
    <option>Secondary</option>
    <option>Certificate</option>
    <option>Diploma</option>
    <option>Degree</option>
    <option>Postgraduate</option>
  </select>

  <!-- EMPLOYMENT -->
  <select>
    <option>Employment Type</option>
    <option>Employed</option>
    <option>Self-employed</option>
    <option>Business Owner</option>
    <option>Casual Worker</option>
    <option>Unemployed</option>
    <option>Student</option>
  </select>

  <input placeholder="Monthly Income (KES)">

  <select>
    <option>Do you have children under 18?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <select>
    <option>Do you have an active loan?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <select>
    <option>Agree to be contacted?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <select>
    <option>Only user of device?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <select>
    <option>Receive monthly income?</option>
    <option>Yes</option>
    <option>No</option>
  </select>
</div>

<!-- CONTACT PERSON -->
<div class="card">
  <div class="title">Contact Person</div>

  <input placeholder="Contact Name">
  <input placeholder="+254 Contact Phone">

  <select>
    <option>Relationship</option>
    <option>Parent</option>
    <option>Sibling</option>
    <option>Friend</option>
    <option>Spouse</option>
    <option>Colleague</option>
  </select>

  <button onclick="next()">Continue</button>
</div>

</div>

<script>
function next(){
  window.location.href = "confirm.html";
}
</script>

</body>
</html>
