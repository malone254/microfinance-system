<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LendPlus - Loan Application</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 8%;
  background:#0f172a;
}

.logo{
  color:#22c55e;
  font-weight:800;
}

.container{
  max-width:850px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:15px;
  margin-top:20px;
}

h2{
  color:#22c55e;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

label{
  font-size:13px;
  opacity:0.8;
  margin-bottom:6px;
  display:block;
}

input, select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
  border:1px solid rgba(255,255,255,0.08);
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

/* STEPS */
.step{
  display:none;
}

.step.active{
  display:block;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:25px;
  font-size:12px;
  opacity:0.7;
  margin-top:30px;
  border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">LENDPLUS</div>
  <div onclick="logout()">Logout</div>
</div>

<div class="container">

<!-- STEP 1 -->
<div class="card step active" id="step1">
<h2>1. Personal Information</h2>

<div class="grid">

<div>
<label>First Name</label>
<input type="text">
</div>

<div>
<label>Middle Name</label>
<input type="text">
</div>

<div>
<label>Last Name</label>
<input type="text">
</div>

<div>
<label>Date of Birth</label>
<input type="date">
</div>

<div>
<label>National ID</label>
<input type="text">
</div>

<div>
<label>Email</label>
<input type="email">
</div>

<div>
<label>Gender</label>
<select>
<option>- select -</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div>
<label>Phone (+254)</label>
<input type="tel">
</div>

</div>

<button onclick="nextStep(2)">Continue</button>
</div>

<!-- STEP 2 -->
<div class="card step" id="step2">
<h2>2. Residence Information</h2>

<div class="grid">

<div>
<label>County</label>
<select>
<option>- select county -</option>
<option>Nairobi</option>
<option>Mombasa</option>
<option>Kisumu</option>
<option>Nakuru</option>
<option>Kiambu</option>
<option>Machakos</option>
<option>Eldoret</option>
<option>Kakamega</option>
</select>
</div>

<div>
<label>Town</label>
<input type="text">
</div>

<div>
<label>Housing Type</label>
<select>
<option>Renting</option>
<option>Owned</option>
<option>Family</option>
</select>
</div>

<div>
<label>Monthly Rent</label>
<input type="number">
</div>

</div>

<button onclick="nextStep(3)">Continue</button>
</div>

<!-- STEP 3 -->
<div class="card step" id="step3">
<h2>3. Employment</h2>

<div class="grid">

<div>
<label>Employment Type</label>
<select>
<option>Employed</option>
<option>Self Employed</option>
<option>Unemployed</option>
<option>Student</option>
</select>
</div>

<div>
<label>Employer Name</label>
<input type="text">
</div>

<div>
<label>Job Title</label>
<input type="text">
</div>

<div>
<label>Work Experience (years)</label>
<input type="number">
</div>

</div>

<button onclick="nextStep(4)">Continue</button>
</div>

<!-- STEP 4 -->
<div class="card step" id="step4">
<h2>4. Financial Information</h2>

<div class="grid">

<div>
<label>Monthly Income</label>
<input type="number">
</div>

<div>
<label>Income Source</label>
<select>
<option>Salary</option>
<option>Business</option>
<option>Freelance</option>
<option>Farming</option>
</select>
</div>

<div>
<label>Existing Loans</label>
<select>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label>M-Pesa Number</label>
<input type="tel">
</div>

</div>

<button onclick="nextStep(5)">Continue</button>
</div>

<!-- STEP 5 -->
<div class="card step" id="step5">
<h2>5. Emergency Contact</h2>

<div class="grid">

<div>
<label>Full Name</label>
<input type="text">
</div>

<div>
<label>Relationship</label>
<select>
<option>Parent</option>
<option>Sibling</option>
<option>Friend</option>
<option>Spouse</option>
</select>
</div>

<div>
<label>Phone</label>
<input type="tel">
</div>

</div>

<button onclick="nextStep(6)">Continue</button>
</div>

<!-- STEP 6 -->
<div class="card step" id="step6">
<h2>6. Consent & Submit</h2>

<p style="font-size:13px;opacity:0.8;line-height:1.6;">
By continuing, you agree to data processing and credit verification with  
Credit Reference Bureau Kenya.
</p>

<div class="grid">

<div>
<label>
<input type="checkbox"> I agree to Terms & Privacy Policy
</label>
</div>

</div>

<button onclick="submitForm()">Submit Application</button>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2021–2026 LendPlus. All rights reserved.
</div>

<script>
let currentStep = 1;

function nextStep(step){
  document.getElementById("step"+currentStep).classList.remove("active");
  currentStep = step;
  document.getElementById("step"+currentStep).classList.add("active");
}

function submitForm(){
  window.location.href = "confirm.html";
}

function logout(){
  window.location.href = "login.html";
}
</script>

</body>
</html>
