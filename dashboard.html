<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b1220;color:white;font-family:Inter;padding:20px}

.card{
  background:#111827;
  padding:20px;
  margin:10px;
  border-radius:10px;
}

button{
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>User Dashboard</h2>

<div class="card">
  <h3>Apply Loan</h3>
  <button onclick="location.href='apply-loan.html'">Apply</button>
</div>

<div class="card">
  <h3>My Loans</h3>
  <div id="loans"></div>
</div>

<script>
async function loadLoans(){
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:5000/api/loans",{
    headers:{Authorization:token}
  });

  const data = await res.json();

  document.getElementById("loans").innerHTML =
    data.map(l=>`<p>${l.amount} - ${l.status}</p>`).join("");
}

loadLoans();
</script>

</body>
</html>
