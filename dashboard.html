<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LendPlus Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

.topbar{
  padding:15px 10%;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
}

.logo{
  color:#22c55e;
  font-weight:800;
}

.container{
  padding:30px 10%;
  max-width:900px;
  margin:auto;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:14px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.06);
}

.title{
  color:#22c55e;
  font-weight:700;
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:13px;
  margin:8px 0;
  border-radius:10px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  font-weight:700;
  margin-top:15px;
  cursor:pointer;
}

.step{ display:none; }
.step.active{ display:block; }

.progress{
  margin-bottom:15px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">MALONE LOANS</div>
</div>

<div class="container">

<div class="progress" id="progress">Step 1 of 8</div>

<!-- STEP 1 -->
<div class="card step active">
  <div class="title">Personal Information</div>

  <input id="fn" placeholder="First Name">
  <input id="ln" placeholder="Last Name">
  <input id="idno" placeholder="National ID">
  <input id="email" placeholder="Email">

  <select id="gender">
    <option value="">Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <button onclick="validateStep1()">Continue</button>
</div>

<!-- STEP 2 -->
<div class="card step">
  <div class="title">Location</div>

  <select id="county">
    <option value="">County</option>
    <option>Nairobi</option>
    <option>Mombasa</option>
    <option>Kisumu</option>
    <option>Nakuru</option>
  </select>

  <input id="town" placeholder="Town">

  <button onclick="validateStep2()">Continue</button>
</div>

<!-- STEP 3 -->
<div class="card step">
  <div class="title">Employment</div>

  <select id="edu">
    <option value="">Education</option>
    <option>Primary</option>
    <option>Secondary</option>
    <option>College</option>
    <option>University</option>
  </select>

  <select id="job">
    <option value="">Employment Type</option>
    <option>Employed</option>
    <option>Self Employed</option>
    <option>Business</option>
    <option>Unemployed</option>
  </select>

  <button onclick="validateStep3()">Continue</button>
</div>

<!-- STEP 4 -->
<div class="card step">
  <div class="title">Income</div>

  <select id="income">
    <option value="">Monthly Income</option>
    <option>Below 10k</option>
    <option>10k - 30k</option>
    <option>30k - 50k</option>
    <option>50k+</option>
  </select>

  <select id="loan">
    <option value="">Active Loan?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <button onclick="validateStep4()">Continue</button>
</div>

<!-- STEP 5 -->
<div class="card step">
  <div class="title">Consent</div>

  <select id="contact">
    <option value="">Agree to contact?</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <button onclick="validateStep5()">Continue</button>
</div>

<!-- STEP 6 -->
<div class="card step">
  <div class="title">Contact Person</div>

  <input id="cname" placeholder="Contact Name">
  <input id="cphone" placeholder="Contact Phone">

  <select id="rel">
    <option value="">Relationship</option>
    <option>Parent</option>
    <option>Friend</option>
    <option>Sibling</option>
  </select>

  <button onclick="validateStep6()">Continue</button>
</div>

<!-- STEP 7 -->
<div class="card step">
  <div class="title">Review</div>
  <p>Please confirm all data is correct.</p>

  <button onclick="next()">Continue</button>
</div>

<!-- STEP 8 -->
<div class="card step">
  <div class="title">Submit</div>
  <p>Submit your loan application.</p>

  <button onclick="finish()">Submit</button>
</div>

</div>

<script>

let step = 0;
const steps = document.querySelectorAll(".step");

function show(){
  steps.forEach((s,i)=>{
    s.classList.remove("active");
    if(i===step) s.classList.add("active");
  });
  document.getElementById("progress").innerText =
  "Step " + (step+1) + " of 8";
}

function next(){
  step++;
  show();
}

/* VALIDATION FUNCTIONS */

function validateStep1(){
  if(
    !fn.value || !ln.value || !idno.value || !email.value || !gender.value
  ){
    alert("Fill all Personal Information");
    return;
  }
  next();
}

function validateStep2(){
  if(!county.value || !town.value){
    alert("Fill Location details");
    return;
  }
  next();
}

function validateStep3(){
  if(!edu.value || !job.value){
    alert("Fill Employment details");
    return;
  }
  next();
}

function validateStep4(){
  if(!income.value || !loan.value){
    alert("Fill Income details");
    return;
  }
  next();
}

function validateStep5(){
  if(!contact.value){
    alert("Select consent option");
    return;
  }
  next();
}

function validateStep6(){
  if(!cname.value || !cphone.value || !rel.value){
    alert("Fill contact person details");
    return;
  }
  next();
}

function finish(){
  window.location.href = "confirm.html";
}

</script>

</body>
</html>
