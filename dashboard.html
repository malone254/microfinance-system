<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malone Lending - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b1220;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 8%;
  background:#0f172a;
}

.logo{color:#22c55e;font-weight:800;}
.logout{background:#111827;padding:10px 14px;border-radius:10px;color:white;text-decoration:none;}

.container{
  max-width:900px;
  margin:auto;
  padding:25px;
}

.step{
  display:none;
  background:#111827;
  padding:25px;
  border-radius:16px;
  margin-bottom:20px;
}

.step.active{display:block;}

h2{color:#22c55e;}

input, select{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  background:#0f172a;
  color:white;
  border:1px solid rgba(255,255,255,0.05);
  outline:none;
}

.btns{
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.next{background:#22c55e;color:black;}
.back{background:#1f2937;color:white;}

label{
  font-size:13px;
  display:block;
  margin-top:10px;
}

.footer{
  text-align:center;
  padding:25px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">MALONE</div>
  <a class="logout" href="login.html">Logout</a>
</div>

<div class="container">

<!-- STEP 1 -->
<div class="step active" id="step1">
<h2>1. Personal Information</h2>

<input id="fname" placeholder="First Name">
<input placeholder="Middle Name (optional)">
<input id="lname" placeholder="Last Name">

<!-- MANUAL DOB -->
<input id="dob" placeholder="Date of Birth (dd.mm.yyyy)">

<input id="nid" placeholder="National ID Number">
<input id="email" placeholder="E-mail">

<select id="gender">
  <option value="">Select Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

<input id="altphone" placeholder="+254 Alternative Phone (optional)">

<div class="btns">
  <button class="next" onclick="validateStep1()">Continue</button>
</div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<h2>2. Location</h2>

<select id="county">
<option value="">Select County</option>
<option>Nairobi</option>
<option>Mombasa</option>
<option>Kisumu</option>
<option>Nakuru</option>
</select>

<input id="town" placeholder="Town">

<div class="btns">
  <button class="back" onclick="goBack(2)">Back</button>
  <button class="next" onclick="validateStep2()">Continue</button>
</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<h2>3. Education & Employment</h2>

<select id="edu">
<option value="">Education</option>
<option>Primary</option>
<option>Secondary</option>
<option>College</option>
<option>University</option>
</select>

<select id="emp">
<option value="">Employment</option>
<option>Employed</option>
<option>Self-employed</option>
<option>Student</option>
<option>Unemployed</option>
</select>

<input id="income" placeholder="Monthly Income">

<div class="btns">
  <button class="back" onclick="goBack(3)">Back</button>
  <button class="next" onclick="validateStep3()">Continue</button>
</div>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
<h2>4. Financial Info</h2>

<select id="kids"><option value="">Children under 18?</option><option>Yes</option><option>No</option></select>
<select id="loan"><option value="">Active loan?</option><option>Yes</option><option>No</option></select>
<select id="monthly"><option value="">Monthly income?</option><option>Yes</option><option>No</option></select>

<div class="btns">
  <button class="back" onclick="goBack(4)">Back</button>
  <button class="next" onclick="validateStep4()">Continue</button>
</div>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
<h2>5. Device & Consent</h2>

<select id="device"><option value="">Only user of device?</option><option>Yes</option><option>No</option></select>
<select id="contact"><option value="">Contact before due date?</option><option>Yes</option><option>No</option></select>

<div class="btns">
  <button class="back" onclick="goBack(5)">Back</button>
  <button class="next" onclick="validateStep5()">Continue</button>
</div>
</div>

<!-- STEP 6 -->
<div class="step" id="step6">
<h2>6. Income History</h2>

<select id="lastIncome"><option value="">Income last month?</option><option>Yes</option><option>No</option></select>

<div class="btns">
  <button class="back" onclick="goBack(6)">Back</button>
  <button class="next" onclick="validateStep6()">Continue</button>
</div>
</div>

<!-- STEP 7 -->
<div class="step" id="step7">
<h2>7. Contact Person</h2>

<input id="cname" placeholder="Contact Name">
<input id="cphone" placeholder="+254 Contact Phone">

<select id="relation">
<option value="">Relationship</option>
<option>Parent</option>
<option>Sibling</option>
<option>Friend</option>
<option>Spouse</option>
</select>

<div class="btns">
  <button class="back" onclick="goBack(7)">Back</button>
  <button class="next" onclick="validateStep7()">Continue</button>
</div>
</div>

<!-- STEP 8 -->
<div class="step" id="step8">
<h2>8. Final Agreement</h2>

<label>
<input type="checkbox" id="agree">
I agree to Terms & Conditions and Privacy Policy
</label>

<div class="btns">
  <button class="back" onclick="goBack(8)">Back</button>
  <button class="next" onclick="submitForm()">Submit</button>
</div>
</div>

</div>

<div class="footer">
© 2021-2026 AVENTUS TECHNOLOGY LIMITED. CBK REGULATED KENYA
</div>

<script>

function showStep(n){
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");
}

/* BACK */
function goBack(n){
  showStep(n-1);
}

/* VALIDATION STEP 1 */
function validateStep1(){
  if(
    !fname.value ||
    !lname.value ||
    !dob.value ||
    !nid.value ||
    !email.value ||
    !gender.value
  ){
    alert("Please fill all required fields");
    return;
  }
  showStep(2);
}

/* STEP 2 */
function validateStep2(){
  if(!county.value || !town.value){
    alert("Fill location details");
    return;
  }
  showStep(3);
}

/* STEP 3 */
function validateStep3(){
  if(!edu.value || !emp.value || !income.value){
    alert("Complete education & employment");
    return;
  }
  showStep(4);
}

/* STEP 4 */
function validateStep4(){
  if(!kids.value || !loan.value || !monthly.value){
    alert("Complete financial info");
    return;
  }
  showStep(5);
}

/* STEP 5 */
function validateStep5(){
  if(!device.value || !contact.value){
    alert("Complete device info");
    return;
  }
  showStep(6);
}

/* STEP 6 */
function validateStep6(){
  if(!lastIncome.value){
    alert("Complete income history");
    return;
  }
  showStep(7);
}

/* STEP 7 */
function validateStep7(){
  if(!cname.value || !cphone.value || !relation.value){
    alert("Complete contact person");
    return;
  }
  showStep(8);
}

/* FINAL */
function submitForm(){
  if(!agree.checked){
    alert("You must agree to Terms");
    return;
  }
  window.location.href = "confirm.html";
}

</script>

</body>
</html>
